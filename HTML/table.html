<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            align-self: center;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        tr{background-color: hsl(0, 0%, 95%);}
    </style>
</head>
<body>
    <table>
        <colgroup>
            <col style="width: 30%;">
            <col style="width: 30%;">
            <col style="width: 40%;">
        </colgroup>
        <tr>
            <th>Country</th>
            <th>Country_Code</th>
            <th>Email</th>
        </tr>
        <tr>
            <td>India</td>
            <td>IN</td>
            <td>india@example.com</td>
        </tr>
        <tr>
            <td>Chaina</td>
            <td>CN</td>
            <td>china@example.com</td>
        </tr>
        <tr>
            <td>Italy</td>
            <td>IT</td>
            <td>italy@example.com</td>
        </tr>
        <tr>
            <td>Japan</td>
            <td>JP</td>
            <td>japan@example.com</td>
        </tr>

    </table>
</body>
</html>
